spring:
  application:
    name: event-gateway
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:h2:mem:gateway;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
server:
  port: 8080
account-service:
  base-url: http://localhost:8081
  connect-timeout: 2s
  read-timeout: 3s
gateway:
  replay:
    interval: 5s
    batch-size: 20
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
logging:
  structured:
    format:
      console: ecs
resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        # Without this the breaker leaves OPEN only when a call asks for
        # permission — but ReplayScheduler skips all calls while OPEN, so a
        # breaker opened during an outage would never close and replay would
        # wedge until unrelated submit traffic arrived.
        automatic-transition-from-open-to-half-open-enabled: true
        permitted-number-of-calls-in-half-open-state: 3
